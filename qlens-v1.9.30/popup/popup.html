<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
    :root {
      --bg:  #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9;
      --border: #e2e8f0; --shadow: rgba(0,0,0,.08);
      --blue: #3b82f6; --green: #10b981; --red: #ef4444;
      --orange: #f59e0b; --purple: #8b5cf6;
      --text: #1e293b; --text2: #64748b; --text3: #94a3b8;
      --font: 'Pretendard Variable','Pretendard',-apple-system,sans-serif;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      width: 300px; background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    .hdr {
      background: var(--blue);
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      padding: 16px 16px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .hdr-logo {
      width: 36px; height: 36px; background: rgba(255,255,255,.2);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .hdr-text { flex: 1; }
    .hdr-title { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .hdr-sub { font-size: 11px; color: rgba(255,255,255,.75); margin-top: 2px; }
    .hdr-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,.4); flex-shrink: 0;
    }
    .hdr-dot.on { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,.6); }

    /* QUICK STATS */
    .stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      background: var(--bg2); padding: 12px 14px;
    }
    .stat-label { font-size: 10px; color: var(--text3); font-weight: 600;
                  text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
    .stat-val { font-size: 20px; font-weight: 800; font-family: 'Pretendard Variable', monospace; }
    .stat-val.blue   { color: var(--blue); }
    .stat-val.green  { color: var(--green); }
    .stat-val.orange { color: var(--orange); }
    .stat-val.purple { color: var(--purple); }
    .stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

    /* SKELETON */
    .skel { height: 20px; width: 60px; background: var(--bg3); border-radius: 4px;
            animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.8} 50%{opacity:.4} }

    /* ACTIONS */
    .actions { padding: 12px; display: flex; flex-direction: column; gap: 7px; }
    .btn-main {
      width: 100%; padding: 11px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font);
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all .15s;
    }
    .btn-main.primary {
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: #fff; box-shadow: 0 2px 10px rgba(59,130,246,.3);
    }
    .btn-main.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,.4); }
    .btn-row { display: flex; gap: 7px; }
    .btn-sec {
      flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border);
      font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--font);
      background: var(--bg2); color: var(--text2); display: flex;
      align-items: center; justify-content: center; gap: 5px; transition: all .15s;
    }
    .btn-sec:hover { border-color: var(--blue); color: var(--blue); }

    /* FOOTER */
    .footer {
      padding: 8px 14px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg3);
    }
    .footer-last { font-size: 10px; color: var(--text3); }
    .footer-link { font-size: 10px; color: var(--blue); cursor: pointer; text-decoration: none; }
    .footer-link:hover { text-decoration: underline; }

    /* NO KEY STATE */
    .no-key {
      padding: 24px 16px; text-align: center;
    }
    .no-key-icon { font-size: 40px; margin-bottom: 10px; }
    .no-key-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .no-key-desc { font-size: 11px; color: var(--text2); line-height: 1.6; margin-bottom: 14px; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">🔍</div>
  <div class="hdr-text">
    <div class="hdr-title">QLens</div>
    <div class="hdr-sub">Qoo10 판매 분석</div>
  </div>
  <div class="hdr-dot" id="statusDot"></div>
</div>

<!-- 퀵 스탯 -->
<div class="stats" id="statsGrid">
  <div class="stat">
    <div class="stat-label">판매 중</div>
    <div class="stat-val blue" id="qOnSale"><div class="skel"></div></div>
    <div class="stat-sub">상품</div>
  </div>
  <div class="stat">
    <div class="stat-label">신규 주문</div>
    <div class="stat-val green" id="qOrders"><div class="skel"></div></div>
    <div class="stat-sub">처리 대기</div>
  </div>
  <div class="stat">
    <div class="stat-label">이달 매출</div>
    <div class="stat-val orange" id="qRevenue"><div class="skel"></div></div>
    <div class="stat-sub">JPY 추정</div>
  </div>
  <div class="stat">
    <div class="stat-label">스냅샷</div>
    <div class="stat-val purple" id="qSnaps"><div class="skel"></div></div>
    <div class="stat-sub">누적 기록</div>
  </div>
</div>

<!-- 메인 버튼 -->
<div class="actions" id="actionArea">
  <button class="btn-main primary" id="btnDashboard">📦 상품 관리 열기</button>
  <div class="btn-row">
    <button class="btn-sec" id="btnRefresh">🔄 새로고침</button>
    <button class="btn-sec" id="btnSettings">⚙️ 설정</button>
  </div>
</div>

<!-- API 키 없을 때 -->
<div class="no-key" id="noKeyArea" style="display:none">
  <div class="no-key-icon">🔑</div>
  <div class="no-key-title">QSM 연결 필요</div>
  <div class="no-key-desc">설정에서 Qoo10 QSM API 키와<br>판매자 ID를 입력해주세요</div>
  <button class="btn-main primary" id="btnGoSettings">⚙️ 설정하러 가기</button>
</div>

<div class="footer">
  <div class="footer-last" id="lastUpdate">-</div>
  <a class="footer-link" id="footerDash">상품 관리 →</a>
</div>

<script src="popup.js"></script>
</body>
</html>
